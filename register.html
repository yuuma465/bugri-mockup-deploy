<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録｜BUGRI（バグリ）</title>
<link rel="icon" type="image/png" href="assets/img/bugri-logo.png">
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="brand"><img class="brand-logo" src="assets/img/bugri-wordmark.png" alt="BUGRI バグリ"></a>
    <nav class="hnav">
      <a href="index.html#oripa-list">オリパ一覧</a>
      <a href="index.html#news">速報</a>
      <a href="index.html?sort=popular#oripa-list">ランキング</a>
      <a href="mypage.html#history">当選履歴</a>
      <a href="mypage.html">マイページ</a>
    </nav>
    <div class="header-spacer"></div>
    <span class="points-pill"><span class="pt-ico">◈</span><span id="hdr-points">12,800</span> pt</span>
    <a href="login.html" class="btn-login">ログイン</a>
    <a href="register.html" class="btn-signup">新規登録</a>
  </div>
</header>

<main class="main">
  <div class="auth-wrap">
    <form class="auth-card au-card" onsubmit="return false">
      <span class="au-mark">◈</span>
      <h1 class="auth-title">新規登録</h1>
      <div class="au-bonus-row">
        <span class="bonus-chip">🎁 今だけ 新規登録で 500pt プレゼント</span>
      </div>
      <p class="auth-sub">メール登録ですぐ始められる</p>

      <div class="field">
        <label for="reg-email">メールアドレス</label>
        <input id="reg-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="reg-password">パスワード</label>
        <input id="reg-password" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="reg-password2">パスワード（確認）</label>
        <input id="reg-password2" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>

      <button class="btn-primary-full" type="submit">無料で登録する</button>

      <p class="auth-alt">すでにアカウントをお持ちの方は <a href="login.html">ログイン</a></p>
    </form>
  </div>
</main>
