<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ｜BUGRI（バグリ）</title>
<link rel="icon" type="image/png" href="assets/img/bugri-logo.png">
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="brand"><img class="brand-logo" src="assets/img/bugri-wordmark-clean.png" alt="BUGRI バグリ"></a>
      <nav class="hnav">
        <a href="index.html">ホーム</a>
        <a href="mypage.html">マイページ</a>
        <a href="point.html">ポイント</a>
      </nav>
      <div class="header-spacer"></div>
      <span class="points-pill"><span class="pt-ico">◈</span><span id="hdr-points">12,800</span> pt</span>
      <a href="login.html" class="btn-login">ログイン</a>
      <a href="register.html" class="btn-signup">新規登録</a>
    </div>
  </header>

  <main class="main">
    <div class="wrap">
      <div class="page-head"><h1 class="page-title">マイページ</h1></div>

      <!-- プロフィール -->
      <section class="mp-profile">
        <div class="mp-avatar" id="mp-avatar">K</div>
        <div class="mp-id">
          <div class="mp-id-top">
            <span class="mp-name" id="mp-name">カイ</span>
            <span class="rank-badge" id="mp-rank">GOLD</span>
          </div>
          <div class="mp-rank-prog">
            <div class="gauge"><i id="mp-gauge" style="width:0%"></i></div>
            <div class="mp-rank-note">
              <span id="mp-rank-note">あと —pt で —</span>
              <span id="mp-rank-pts">—</span>
            </div>
          </div>
        </div>
      </section>

      <!-- 統計 -->
      <section class="mp-stats">
        <div class="mp-stat">
          <div class="mp-stat-num" id="mp-gacha">0</div>
          <div class="mp-stat-label">ガチャ回数</div>
        </div>
        <div class="mp-stat">
          <div class="mp-stat-num gold" id="mp-asset">0<small>pt</small></div>
          <div class="mp-stat-label">保有資産</div>
        </div>
        <div class="mp-stat">
          <div class="mp-stat-num" id="mp-cards">0<small>枚</small></div>
          <div class="mp-stat-label">保有枚数</div>
        </div>
      </section>

      <!-- タブ -->
      <nav class="tabs" id="mp-tabs">
        <span class="tab on" data-tab="coll">コレクション</span>
        <span class="tab" data-tab="hist">履歴</span>
      </nav>

      <section class="mp-panel on" data-panel="coll">
        <div class="mp-coll" id="mp-coll"></div>
      </section>
      <section class="mp-panel" data-panel="hist">
        <div class="mp-hist" id="mp-hist"></div>
      </section>
    </div>
  </main>

  <footer class="footer"><div class="wrap">
    <div class="footer-links"><a href="#">利用規約</a><a href="#">プライバシーポリシー</a><a href="#">特定商取引法に基づく表記</a><a href="#">FAQ</a><a href="#">お問い合わせ</a></div>
    <p class="footer-copy">&copy; 2026 BUGRI（バグリ）｜バグってるほど、アツい。 — デザインモックアップ（ダミーデータ）</p>
  </div></footer>

  <nav class="bottom-nav">
    <a href="index.html"><i>⌂</i><span>ホーム</span></a>
    <a href="mypage.html" class="on"><i>◈</i><span>マイページ</span></a>
    <a href="point.html"><i>＋</i><span>ポイント</span></a>
    <a href="login.html"><i>⏻</i><span>ログイン</span></a>
  </nav>

  <script src="assets/js/data.js"></script>
  <script>
  (function () {
    // tiny ヘルパ（app.js 非依存）
    var fmt = function (n) { return Number(n).toLocaleString('ja-JP'); };
    var rcls = function (r) { return ({ SSR: 'ssr', SR: 'sr', R: 'r', N: 'n' })[r] || 'n'; };
    var glyph = function (r) { return ({ SSR: '★', SR: '◆', R: '◇', N: '•' })[r] || '•'; };

    // プロフィール
    var u = USER_PROFILE;
    document.getElementById('mp-name').textContent = u.name;
    document.getElementById('mp-avatar').textContent = u.name.charAt(0);
    var rb = document.getElementById('mp-rank');
    rb.textContent = u.rank;
    rb.className = 'rank-badge ' + u.rank.toLowerCase();
    var pct = Math.min(100, Math.round((u.rankCurrentPt / u.rankNextPt) * 100));
    document.getElementById('mp-gauge').style.width = pct + '%';
    document.getElementById('mp-rank-note').innerHTML =
      'あと <b>' + fmt(u.rankNextPt - u.rankCurrentPt) + 'pt</b> で ' + u.nextRank;
    document.getElementById('mp-rank-pts').textContent =
      fmt(u.rankCurrentPt) + ' / ' + fmt(u.rankNextPt) + ' pt';

    // 統計
    document.getElementById('mp-gacha').textContent = fmt(u.gachaCount);
    document.getElementById('mp-asset').innerHTML = fmt(u.assetPt) + '<small>pt</small>';
    document.getElementById('mp-cards').innerHTML = fmt(u.cardCount) + '<small>枚</small>';

    // コレクション
    document.getElementById('mp-coll').innerHTML = COLLECTION.map(function (c) {
      var cl = rcls(c.rarity);
      return '<div class="mp-card ' + cl + '">' +
        '<div class="mp-face"><span class="rb ' + cl + '">' + c.rarity + '</span></div>' +
        '<div class="mp-card-body">' +
        '<div class="mp-card-name">' + c.name + '</div>' +
        '<div class="mp-card-val">' + fmt(c.value) + ' pt</div>' +
        '</div></div>';
    }).join('');

    // 履歴
    document.getElementById('mp-hist').innerHTML = HISTORY.map(function (h) {
      var cl = rcls(h.rarity);
      return '<div class="mp-hist-row">' +
        '<div class="mp-hist-time">' + h.datetime + '</div>' +
        '<div class="mp-hist-main">' +
        '<div class="mp-hist-pack">' + h.pack + '</div>' +
        '<div class="mp-hist-card"><span class="rb ' + cl + '">' + h.rarity + '</span>' + h.card + '</div>' +
        '</div>' +
        '<div class="mp-hist-spent">-' + fmt(h.spent) + '<small>pt</small></div>' +
        '</div>';
    }).join('');

    // タブ切替
    var tabs = document.querySelectorAll('#mp-tabs .tab');
    var panels = document.querySelectorAll('.mp-panel');
    tabs.forEach(function (t) {
      t.addEventListener('click', function () {
        tabs.forEach(function (x) { x.classList.remove('on'); });
        t.classList.add('on');
        var key = t.getAttribute('data-tab');
        panels.forEach(function (p) {
          p.classList.toggle('on', p.getAttribute('data-panel') === key);
        });
      });
    });
  })();
  </script>
</body></html>
