<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

</head><body>
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="brand"><img class="brand-logo" src="assets/img/bugri-wordmark.png" alt="BUGRI バグリ"></a>
    <nav class="hnav">
      <a href="index.html#oripa-list">オリパ一覧</a>
      <a href="news.html">速報</a>

    <div class="header-spacer"></div>
    <span class="points-pill"><span class="pt-ico">◈</span><span id="hdr-points">12,800</span> pt</span>
    <a href="login.html" class="btn-login">ログイン</a>
    <a href="register.html" class="btn-signup">新規登録</a>
  </div>
</header>

<main class="main">
  <div class="auth-wrap">
    <form class="auth-card au-card" onsubmit="return false">
      <span class="au-mark">◈</span>
      <h1 class="auth-title">ログイン</h1>
      <p class="auth-sub">BUGRI アカウントでログイン</p>

      <div class="field">
        <label for="login-email">メールアドレス</label>
        <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="login-password">パスワード</label>
        <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-primary-full" type="submit">ログイン</button>

      <p class="auth-alt">アカウントをお持ちでない方は <a href="register.html">新規登録</a></p>
    </form>
  </div>
</main>
