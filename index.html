<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BUGRI（バグリ）｜オンラインオリパ</title>
  <link rel="icon" type="image/png" href="assets/img/bugri-logo.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- ヘッダー -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="brand"><img class="brand-logo" src="assets/img/bugri-wordmark.png" alt="BUGRI バグリ"></a>
      <nav class="hnav">
        <a href="index.html">ホーム</a>
        <a href="mypage.html">マイページ</a>
        <a href="point.html">ポイント</a>
      </nav>
      <div class="header-spacer"></div>
      <span class="points-pill"><span class="pt-ico">◈</span><span id="hdr-points">0</span> pt</span>
      <a href="login.html" class="btn-login">ログイン</a>
      <a href="register.html" class="btn-signup">新規登録</a>
    </div>
  </header>

  <main class="main">
    <div class="wrap">
      <!-- ヒーローバナー -->
      <section class="hero">
        <div class="hero-track" id="hero-track"></div>
        <div class="hero-dots" id="hero-dots"></div>
      </section>

      <!-- カテゴリタブ -->
      <nav class="cats" id="cats"></nav>

      <!-- ソート -->
      <div class="sec-head">
        <h2 class="sec-title">オリパ一覧 <span class="sec-count" id="pack-count"></span></h2>
        <div class="sorts" id="sorts">
          <span class="sort on" data-sort="new">新着</span>
          <span class="sort" data-sort="popular">人気</span>
          <span class="sort" data-sort="cheap">価格安い</span>
          <span class="sort" data-sort="expensive">価格高い</span>
        </div>
      </div>

      <!-- グリッド -->
      <section class="grid" id="grid"></section>

      <!-- 当選報告 -->
      <div class="sec-head" style="margin-top:42px;">
        <h2 class="sec-title">リアルタイム当選報告</h2>
      </div>
      <section class="winfeed" id="winfeed"></section>
    </div>
  </main>

  <footer class="footer">
    <div class="wrap">
      <div class="footer-links">
        <a href="#">利用規約</a>
        <a href="#">プライバシーポリシー</a>
        <a href="#">特定商取引法に基づく表記</a>
        <a href="#">FAQ</a>
        <a href="#">お問い合わせ</a>
      </div>
      <p class="footer-copy">&copy; 2026 BUGRI（バグリ）｜バグってるほど、アツい。 — デザインモックアップ（ダミーデータ）</p>
    </div>
  </footer>

  <nav class="bottom-nav">
    <a href="index.html" class="on"><i>⌂</i><span>ホーム</span></a>
    <a href="mypage.html"><i>◈</i><span>マイページ</span></a>
    <a href="point.html"><i>＋</i><span>ポイント</span></a>
    <a href="login.html"><i>⏻</i><span>ログイン</span></a>
  </nav>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>renderIndex();</script>

</html>
